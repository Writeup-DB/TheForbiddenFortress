version: '3.8'

services:
  backend:
    build: ./backend
    container_name: writeupdb_backend
    expose:
      - "5000"
    restart: unless-stopped

  proxy:
    image: nginx:latest
    container_name: writeupdb_proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
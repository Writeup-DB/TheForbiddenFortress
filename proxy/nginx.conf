events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Challenge 2: Trailing Illusion (Strict exact match)
        location = /metrics {
            return 403 "403 Forbidden - Proxy Access Denied";
        }

        # Challenge 3: Proxy Confusion (Prefix match)
        location /api/internal {
            return 403 "403 Forbidden - Proxy Access Denied";
        }

        # Challenge 4: Lazy Filter (Case-sensitive regex)
        location ~ ^/secret-vault$ {
            return 403 "403 Forbidden - Proxy Access Denied";
        }

        # Challenge 8: Ghost Request (Blocked at proxy, but backend accepts headers)
        location /system/config {
            return 403 "403 Forbidden - Proxy Access Denied";
        }

        # Challenge 9: Double Encoding Maze
        location = /vault {
            return 403 "403 Forbidden - Proxy Access Denied";
        }

        # Route everything else to the Flask backend
        location / {
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            # Intentionally NOT setting X-Real-IP to allow IP spoofing for Ch 1 & 7
        }
    }
}